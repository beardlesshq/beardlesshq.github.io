<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Not Found — {{ .Site.Title }}</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='78' x='18' font-size='86' font-family='Georgia,serif' fill='%23e8e4df'>B</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=DM+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a08;
      --fg: #e8e4df;
      --muted: #5a5550;
      --accent: #c4a882;
    }

    body {
      background: radial-gradient(ellipse at center, #0d0d0b 0%, #060604 100%);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    main {
      text-align: center;
      padding: 2rem;
      animation: arrive 1.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    h1 {
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      font-weight: 300;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      text-transform: uppercase;
      letter-spacing: 0.28em;
      padding-right: 0.28em;
      line-height: 1;
    }

    .rule {
      display: block;
      width: 32px;
      height: 1px;
      background: var(--muted);
      margin: 2rem auto;
      border: none;
      opacity: 0.6;
    }

    .back {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--fg);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .back:hover {
      color: var(--accent);
    }

    @keyframes arrive {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>Not Found</h1>
    <hr class="rule">
    <a class="back" href="/">Back</a>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#060604">
  <title>Not Found — {{ .Site.Title }}</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' x='22' font-size='80' font-family='system-ui,sans-serif' font-weight='700' fill='%23e8e4df'%3Eb%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a08;
      --fg: #e8e4df;
      --muted: #5a5550;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    main {
      text-align: center;
      padding: 2rem;
      animation: arrive 1.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    h1 {
      font-family: 'Syne', system-ui, sans-serif;
      font-weight: 700;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 0.08em;
      line-height: 1;
      text-transform: lowercase;
    }

    .back {
      display: inline-block;
      margin-top: 1.6rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--fg);
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    .back:hover {
      opacity: 0.6;
    }

    @keyframes arrive {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>not found</h1>
    <a class="back" href="/">back</a>
  </main>
</body>
</html>

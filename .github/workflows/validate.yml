name: Validate

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: public/
          css: false
          extra: --ignore-re "is not a .* value"

      - name: Check no JS in output
        run: |
          if grep -r '<script' public/ --include='*.html' | grep -v 'livereload'; then
            echo "Unexpected JavaScript found in output"
            exit 1
          fi
